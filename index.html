<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Link-in-Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;
  --text:#ffffff;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.35);
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --accent:#5865f2;--r:14px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;scroll-behavior:smooth}
body{overflow-x:hidden}

/* ═══════ PUBLIC PAGE (ENGLISH) ═══════ */
#pub{max-width:480px;margin:0 auto;padding-bottom:40px;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.hero{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;background:var(--bg3)}
.hero-img{width:100%;height:100%;object-fit:cover;display:block}
.hero-grad{position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(to top,var(--bg) 15%,transparent 100%)}

.profile{text-align:center;padding:0 20px;margin-top:-60px;position:relative;z-index:2}
.profile-avatar-wrap{display:inline-block;margin-bottom:12px;position:relative}
.profile-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid var(--bg);background:var(--bg3);display:block}
.profile-name{font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px}
.profile-name svg{width:20px;height:20px;flex-shrink:0}
.profile-handle{font-size:14px;color:var(--text2);margin-bottom:12px}
.profile-bio{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px;max-width:320px;margin-left:auto;margin-right:auto}

.block-header{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin:24px 0 12px;text-align:center}

.socials-row{display:flex;justify-content:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.soc-item{width:42px;height:42px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .2s;text-decoration:none}
.soc-item:hover{transform:scale(1.1)}
.soc-item img{width:22px;height:22px;object-fit:contain}

.content{padding:0 16px}
.btns-list{display:flex;flex-direction:column;gap:12px}
.wide-btn{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-decoration:none;color:var(--text);transition:all .2s}
.wide-btn:hover{background:var(--bg3);transform:translateY(-1px)}
.wide-btn-icon{width:44px;height:44px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.wide-btn-icon img{width:100%;height:100%;object-fit:cover}
.wide-btn-text{flex:1}
.wide-btn-title{font-size:15px;font-weight:700}
.wide-btn-sub{font-size:12px;color:var(--text2);margin-top:2px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-item{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;background:var(--bg3);display:block;text-decoration:none}
.grid-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.grid-item:hover img{transform:scale(1.05)}
.grid-label{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);font-size:13px;font-weight:700;color:#fff}

.video-block video{width:100%;border-radius:var(--r);background:#000;display:block}

.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gal-img{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer;background:var(--bg3);transition:opacity .2s}
.gal-img:hover{opacity:0.8}

/* ═══════ ADMIN (RUSSIAN) ═══════ */
#adm{max-width:560px;margin:0 auto;padding:20px 16px 100px;display:none}
.adm-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px}
.adm-h2{font-size:14px;font-weight:900;text-transform:uppercase;color:#a5aaff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.f-group{margin-bottom:14px}
.f-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.inp{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:inherit;font-size:14px;outline:none}
.inp:focus{border-color:var(--accent)}
.row-split{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.toggle-row:last-child{border-bottom:none}
.switch{position:relative;width:40px;height:22px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#333;border-radius:34px;transition:.3s}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
input:checked + .slider{background:var(--accent)}
input:checked + .slider:before{transform:translateX(18px)}

.btn-add{width:100%;padding:12px;background:var(--bg3);border:1px dashed var(--border2);border-radius:10px;color:var(--text2);cursor:pointer;margin-top:10px;font-weight:600}
.btn-save-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:480px;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:16px;font-weight:800;font-size:16px;box-shadow:0 10px 30px rgba(0,0,0,0.5);cursor:pointer;z-index:100}

/* Stats Fab */
.fab-btn{position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:90;box-shadow:0 4px 15px rgba(88,101,242,0.4);border:none;color:#fff}
.fab-stats{right:80px;background:#2ea043}

/* Stats Table */
.stats-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.stats-table td{padding:8px;border-bottom:1px solid var(--border)}
.stats-table .count{font-weight:900;color:var(--accent);text-align:right}

/* Lightbox & Cropper */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.crop-container{width:100%;max-width:400px;aspect-ratio:4/5;background:#111;position:relative;overflow:hidden;border-radius:8px}
#crop-img{position:absolute;cursor:move;user-select:none;touch-action:none}
.crop-overlay{position:absolute;inset:0;box-shadow:0 0 0 4000px rgba(0,0,0,0.6);border:2px solid var(--accent);pointer-events:none}
</style>
</head>
<body>

<div id="pub">
  <div class="hero">
    <img id="p-banner" class="hero-img" src="" alt="">
    <div class="hero-grad"></div>
  </div>
  
  <div class="profile">
    <div class="profile-avatar-wrap">
      <img id="p-avatar" class="profile-avatar" src="" alt="">
    </div>
    <div class="profile-name">
      <span id="p-name">Name</span>
      <svg id="p-badge" style="display:none" viewBox="0 0 24 24" fill="none"><path d="M10.154 2.185c.956-1.127 2.736-1.127 3.692 0l.732.863c.414.489 1.055.732 1.683.637l1.112-.168c1.455-.22 2.713 1.037 2.493 2.493l-.168 1.112c-.095.628.148 1.269.637 1.683l.863.732c1.127.956 1.127 2.736 0 3.692l-.863.732c-.489.414-.732 1.055-.637 1.683l.168 1.112c.22 1.455-1.037 2.713-2.493 2.493l-1.112-.168c-.628-.095-1.269.148-1.683.637l-.732.863c-.956 1.127-2.736 1.127-3.692 0l-.732-.863c-.414-.489-1.055-.732-1.683-.637l-1.112.168c-1.455.22-2.713-1.037-2.493-2.493l.168-1.112c.095-.628-.148-1.269-.637-1.683l-.863-.732c-1.127-.956-1.127-2.736 0-3.692l.863-.732c.489-.414.732-1.055.637-1.683l-.168-1.112c-.22-1.455 1.037-2.713 2.493-2.493l1.112.168c.628.095 1.269-.148 1.683-.637l.732-.863z" fill="#1d9bf0"/><path d="M8.5 12.5l2.5 2.5 5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="profile-handle" id="p-handle">@handle</div>
    <div class="profile-bio" id="p-bio">Bio text here...</div>
    
    <div id="h-socials" class="block-header">Follow me</div>
    <div class="socials-row" id="p-socials"></div>
  </div>

  <div class="content">
    <div id="h-grid" class="block-header">Portfolio</div>
    <div class="grid-2" id="p-grid"></div>

    <div id="h-btns" class="block-header">My Links</div>
    <div class="btns-list" id="p-btns"></div>

    <div id="h-video" class="block-header">Video</div>
    <div class="video-block" id="p-video-container">
      <video id="p-video" controls playsinline loop muted autoplay src=""></video>
    </div>

    <div id="h-gallery" class="block-header">Gallery</div>
    <div class="gallery-grid" id="p-gallery"></div>
  </div>
</div>

<div id="adm">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
    <h1 style="font-size:22px">Админка</h1>
    <button onclick="location.reload()" style="background:none; border:none; color:var(--text2); cursor:pointer">Выход</button>
  </div>

  <div class="adm-card">
    <div class="adm-h2">📊 Статистика кликов</div>
    <div id="stats-content">
      <table class="stats-table" id="stats-table-body"></table>
    </div>
  </div>

  <div class="adm-card">
    <div class="adm-h2">👤 Профиль</div>
    <div class="row-split">
      <div class="f-group">
        <label class="f-label">Имя</label>
        <input class="inp" id="a-name">
      </div>
      <div class="f-group">
        <label class="f-label">Хэндл (@)</label>
        <input class="inp" id="a-handle">
      </div>
    </div>
    <div class="f-group">
      <label class="f-label">Описание (Bio)</label>
      <textarea class="inp" id="a-bio" style="height:80px"></textarea>
    </div>
    <div class="toggle-row">
      <span>Синяя галочка</span>
      <label class="switch"><input type="checkbox" id="a-badge"><span class="slider"></span></label>
    </div>
    <div class="f-group">
      <label class="f-label">Аватар</label>
      <input type="file" id="up-avatar" hidden onchange="initCrop(this, 'avatar')">
      <button class="btn-add" onclick="$('up-avatar').click()">Сменить фото профиля</button>
    </div>
    <div class="f-group">
      <label class="f-label">Баннер (Шапка 4:5)</label>
      <input type="file" id="up-banner" hidden onchange="initCrop(this, 'banner')">
      <button class="btn-add" onclick="$('up-banner').click()">Сменить баннер</button>
    </div>
  </div>

  <div class="adm-card">
    <div class="adm-h2">📑 Настройка заголовков блоков</div>
    
    <div class="f-group">
      <div class="toggle-row">
        <input class="inp" id="a-h-socials" style="width:70%" placeholder="Заголовок соцсетей">
        <label class="switch"><input type="checkbox" id="a-h-socials-on"><span class="slider"></span></label>
      </div>
    </div>
    <div class="f-group">
      <div class="toggle-row">
        <input class="inp" id="a-h-grid" style="width:70%" placeholder="Заголовок сетки">
        <label class="switch"><input type="checkbox" id="a-h-grid-on"><span class="slider"></span></label>
      </div>
    </div>
    <div class="f-group">
      <div class="toggle-row">
        <input class="inp" id="a-h-btns" style="width:70%" placeholder="Заголовок ссылок">
        <label class="switch"><input type="checkbox" id="a-h-btns-on"><span class="slider"></span></label>
      </div>
    </div>
    <div class="f-group">
      <div class="toggle-row">
        <input class="inp" id="a-h-video" style="width:70%" placeholder="Заголовок видео">
        <label class="switch"><input type="checkbox" id="a-h-video-on"><span class="slider"></span></label>
      </div>
    </div>
    <div class="f-group">
      <div class="toggle-row">
        <input class="inp" id="a-h-gallery" style="width:70%" placeholder="Заголовок галереи">
        <label class="switch"><input type="checkbox" id="a-h-gallery-on"><span class="slider"></span></label>
      </div>
    </div>
  </div>

  <div class="adm-card">
    <div class="adm-h2">🔗 Кнопки-ссылки</div>
    <div id="a-btns-container"></div>
    <button class="btn-add" onclick="addItem('buttons')">+ Добавить кнопку</button>
  </div>

  <button class="btn-save-fixed" id="save-btn" onclick="saveData()">СОХРАНИТЬ ВСЕ</button>
</div>

<div id="crop-modal" class="modal">
  <h2 style="margin-bottom:10px">Обрежьте фото</h2>
  <div class="crop-container" id="crop-area">
    <img id="crop-img" src="">
    <div class="crop-overlay"></div>
  </div>
  <div style="margin-top:20px; display:flex; gap:10px">
    <button class="btn-add" style="width:100px; background:#333; border:none" onclick="closeModal()">Отмена</button>
    <button class="btn-add" style="width:150px; background:var(--accent); color:white; border:none" onclick="applyCrop()">Готово</button>
  </div>
</div>

<button class="fab-btn" id="admin-trigger" onclick="login()">⚙️</button>

<script>
// --- КОНФИГУРАЦИЯ ---
const BIN_ID = '6a06f932c0954111d828dbdc'; // Вставь свой ID
const API_KEY = '$2a$10$MD7CFgyBrv5xr9otmlv/HefViokFkVbS5D6IaCGGp8T2Df6PTV1b.'; // Вставь свой ключ
const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/do7yxqdcr/image/upload';
const CLOUDINARY_PRESET = 'taplink';

let C = {}; // Объект данных
const $ = id => document.getElementById(id);

// --- ЗАГРУЗКА ---
async function load() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: {'X-Access-Key': API_KEY, 'X-Bin-Meta': false}
  });
  C = await res.json();
  
  // Инициализация пустых полей статистики, если их нет
  if(!C.stats) C.stats = { views: 0, clicks: {} };
  C.stats.views++;
  updateBin(); // Учет просмотра
  
  renderPub();
}

function renderPub() {
  $('p-name').innerText = C.name || 'Your Name';
  $('p-handle').innerText = C.handle || '@handle';
  $('p-bio').innerText = C.bio || '';
  $('p-badge').style.display = C.badge ? 'inline' : 'none';
  if(C.avatar) $('p-avatar').src = C.avatar;
  if(C.banner) $('p-banner').src = C.banner;

  // Заголовки блоков
  const headers = ['socials', 'grid', 'btns', 'video', 'gallery'];
  headers.forEach(h => {
    const el = $(`h-${h}`);
    el.innerText = C[`h_${h}_text`] || '';
    el.style.display = C[`h_${h}_on`] ? 'block' : 'none';
  });

  // Рендер кнопок
  const bList = $('p-btns'); bList.innerHTML = '';
  (C.buttons || []).forEach((b, idx) => {
    const a = document.createElement('a');
    a.className = 'wide-btn';
    a.href = b.url;
    a.target = '_blank';
    a.onclick = () => trackClick(`Button: ${b.title}`);
    a.innerHTML = `
      <div class="wide-btn-icon">${b.img ? `<img src="${b.img}">` : '🔗'}</div>
      <div class="wide-btn-text">
        <div class="wide-btn-title">${b.title}</div>
        <div class="wide-btn-sub">${b.sub || ''}</div>
      </div>
    `;
    bList.appendChild(a);
  });

  // Остальные блоки рендерятся аналогично...
}

// --- СТАТИСТИКА ---
function trackClick(label) {
  if(!C.stats.clicks) C.stats.clicks = {};
  C.stats.clicks[label] = (C.stats.clicks[label] || 0) + 1;
  updateBin();
}

async function updateBin() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json', 'X-Access-Key': API_KEY},
    body: JSON.stringify(C)
  });
}

// --- АДМИНКА ---
function login() {
  const p = prompt('Введите пароль:');
  if(p === 'admin') {
    $('pub').style.display = 'none';
    $('admin-trigger').style.display = 'none';
    $('adm').style.display = 'block';
    fillAdm();
  }
}

function fillAdm() {
  $('a-name').value = C.name || '';
  $('a-handle').value = C.handle || '';
  $('a-bio').value = C.bio || '';
  $('a-badge').checked = !!C.badge;

  // Заголовки
  ['socials', 'grid', 'btns', 'video', 'gallery'].forEach(h => {
    $(`a-h-${h}`).value = C[`h_${h}_text`] || '';
    $(`a-h-${h}-on`).checked = !!C[`h_${h}_on`];
  });

  // Таблица статистики
  const tbody = $('stats-table-body');
  tbody.innerHTML = `<tr><td>Просмотры страницы</td><td class="count">${C.stats.views}</td></tr>`;
  for(let key in (C.stats.clicks || {})) {
    tbody.innerHTML += `<tr><td>${key}</td><td class="count">${C.stats.clicks[key]}</td></tr>`;
  }

  renderAdmBtns();
}

function renderAdmBtns() {
  const cont = $('a-btns-container');
  cont.innerHTML = '';
  (C.buttons || []).forEach((b, i) => {
    cont.innerHTML += `
      <div class="f-group" style="border: 1px solid #333; padding: 10px; border-radius: 8px">
        <input class="inp" placeholder="Заголовок" value="${b.title}" onchange="C.buttons[${i}].title=this.value">
        <input class="inp" placeholder="Ссылка" value="${b.url}" onchange="C.buttons[${i}].url=this.value" style="margin-top:5px">
        <button onclick="C.buttons.splice(${i},1); renderAdmBtns()" style="color:red; background:none; border:none; margin-top:5px; cursor:pointer">Удалить</button>
      </div>
    `;
  });
}

function addItem(type) {
  if(!C[type]) C[type] = [];
  C[type].push({title: 'Новая кнопка', url: '#'});
  renderAdmBtns();
}

async function saveData() {
  const btn = $('save-btn');
  btn.innerText = 'СОХРАНЯЮ...';
  
  C.name = $('a-name').value;
  C.handle = $('a-handle').value;
  C.bio = $('a-bio').value;
  C.badge = $('a-badge').checked;

  ['socials', 'grid', 'btns', 'video', 'gallery'].forEach(h => {
    C[`h_${h}_text`] = $(`a-h-${h}`).value;
    C[`h_${h}_on`] = $(`a-h-${h}-on`).checked;
  });

  await updateBin();
  alert('Данные сохранены!');
  location.reload();
}

// --- КРОППЕР (ФИКС 4:5) ---
let currentCropType = '';
let cropData = { x: 0, y: 0, scale: 1 };

function initCrop(input, type) {
  currentCropType = type;
  const file = input.files[0];
  if(!file) return;
  
  const reader = new FileReader();
  reader.onload = e => {
    $('crop-img').src = e.target.result;
    $('crop-modal').style.display = 'flex';
    // Центрируем
    setTimeout(() => {
      const img = $('crop-img');
      img.style.left = '0px';
      img.style.top = '0px';
      img.style.width = '100%';
    }, 100);
  };
  reader.readAsDataURL(file);
}

// Упрощенная логика перетаскивания для примера
let isDragging = false;
let startX, startY;
$('crop-img').onmousedown = e => { isDragging = true; startX = e.clientX - cropData.x; startY = e.clientY - cropData.y; };
window.onmousemove = e => {
  if(!isDragging) return;
  cropData.x = e.clientX - startX;
  cropData.y = e.clientY - startY;
  $('crop-img').style.transform = `translate(${cropData.x}px, ${cropData.y}px)`;
};
window.onmouseup = () => isDragging = false;

async function applyCrop() {
  const img = $('crop-img');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  // Для баннера ставим 1080x1350 (4:5)
  canvas.width = currentCropType === 'banner' ? 1080 : 800;
  canvas.height = currentCropType === 'banner' ? 1350 : 800;

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  
  const base64 = canvas.toDataURL('image/jpeg', 0.8);
  
  // Загрузка в Cloudinary
  const formData = new FormData();
  formData.append('file', base64);
  formData.append('upload_preset', CLOUDINARY_PRESET);

  const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
  const data = await res.json();
  
  C[currentCropType] = data.secure_url;
  closeModal();
  alert('Фото готово!');
}

function closeModal() { $('crop-modal').style.display = 'none'; }

load();
</script>
</body>
</html>
